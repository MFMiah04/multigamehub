<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fakin' It - Waiting</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎮 Fakin' It</h1>

    <div class="status-message" id="statusMessage">
      Waiting for questions...
    </div>
  </div>

  <script type="module">
    import { listenToRoom } from '../../firebase-config.js';
    import { getUrlParams, navigateToPage } from '../../utils.js';

    const { roomCode, playerId } = getUrlParams();

    if (!roomCode || !playerId) {
      window.location.href = '../../index.html';
    }

    const statusMessage = document.getElementById('statusMessage');
    let isLateJoiner = false;

    // Listen for phase changes
    listenToRoom(roomCode, (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        window.location.href = '../../index.html';
        return;
      }

      const playerData = data.players?.[playerId];
      isLateJoiner = !playerData?.inGame;

      // Update message based on status
      if (isLateJoiner) {
        statusMessage.innerHTML = '<h2>Game in Progress</h2><p>Please wait for the current round to finish...</p><p>You\'ll be able to join when the host returns to the lobby.</p>';
      } else {
        statusMessage.textContent = 'Waiting for questions...';
      }

      // Only redirect if not a late joiner
      if (!isLateJoiner) {
        if (data.phase === 'answer') {
          window.location.href = `answer.html?roomCode=${roomCode}&playerId=${playerId}`;
        }
      }

      // All players go to lobby when phase is lobby
      if (data.phase === 'lobby') {
        window.location.href = `../../lobby.html?roomCode=${roomCode}&playerId=${playerId}`;
      }
    });
  </script>
</body>
</html>
